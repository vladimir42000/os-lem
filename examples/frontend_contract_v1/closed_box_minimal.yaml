meta:
  name: closed_box_minimal
  radiation_space: 2pi

driver:
  id: drv1
  model: ts_classic
  Re: 5.8 ohm
  Le: 0.35 mH
  Fs: 34 Hz
  Qes: 0.42
  Qms: 4.1
  Vas: 55 l
  Sd: 132 cm2
  node_front: front
  node_rear: rear

elements:
  - id: front_rad
    type: radiator
    node: front
    model: infinite_baffle_piston
    area: 132 cm2
  - id: rear_box
    type: volume
    node: rear
    value: 18 l

observations:
  - id: zin
    type: input_impedance
    target: drv1
  - id: spl_front
    type: spl
    target: front_rad
    distance: 1 m
  - id: xcone
    type: cone_displacement
    target: drv1
