meta:
  name: vented_box
  radiation_space: 2pi

driver:
  id: drv1
  model: ts_classic
  Re: 5.8 ohm
  Le: 0.35 mH
  Fs: 34 Hz
  Qes: 0.42
  Qms: 4.1
  Vas: 55 l
  Sd: 132 cm2
  node_front: front
  node_rear: rear

elements:
  - id: front_rad
    type: radiator
    node: front
    model: infinite_baffle_piston
    area: 132 cm2

  - id: rear_box
    type: volume
    node: rear
    value: 28 l

  - id: port
    type: duct
    node_a: rear
    node_b: port_mouth
    length: 18 cm
    area: 24 cm2

  - id: port_rad
    type: radiator
    node: port_mouth
    model: unflanged_piston
    area: 24 cm2

observations:
  - id: zin
    type: input_impedance
    target: drv1

  - id: spl_driver
    type: spl
    target: front_rad
    distance: 1 m

  - id: spl_port
    type: spl
    target: port_rad
    distance: 1 m

  - id: spl_total
    type: spl_sum
    terms:
      - target: front_rad
        distance: 1 m
      - target: port_rad
        distance: 1 m
