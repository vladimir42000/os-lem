meta:
  name: conical_line
  radiation_space: 2pi

driver:
  id: drv1
  model: ts_classic
  Re: 5.8 ohm
  Le: 0.35 mH
  Fs: 34 Hz
  Qes: 0.42
  Qms: 4.1
  Vas: 55 l
  Sd: 132 cm2
  node_front: front
  node_rear: rear

elements:
  - id: front_rad
    type: radiator
    node: front
    model: infinite_baffle_piston
    area: 132 cm2

  - id: rear_volume
    type: volume
    node: rear
    value: 8 l

  - id: line_1
    type: waveguide_1d
    node_a: rear
    node_b: mouth
    length: 1.45 m
    area_start: 120 cm2
    area_end: 320 cm2
    profile: conical
    segments: 16
    loss: 0.18

  - id: mouth_rad
    type: radiator
    node: mouth
    model: unflanged_piston
    area: 320 cm2

observations:
  - id: zin
    type: input_impedance
    target: drv1

  - id: spl_driver
    type: spl
    target: front_rad
    distance: 1 m

  - id: spl_mouth
    type: spl
    target: mouth_rad
    distance: 1 m

  - id: spl_total
    type: spl_sum
    terms:
      - target: front_rad
        distance: 1 m
      - target: mouth_rad
        distance: 1 m

  - id: p_rear
    type: node_pressure
    target: rear

  - id: line_q_a
    type: element_volume_velocity
    target: line_1
    location: a

  - id: line_q_b
    type: element_volume_velocity
    target: line_1
    location: b

  - id: line_v_a
    type: element_particle_velocity
    target: line_1
    location: a

  - id: line_v_b
    type: element_particle_velocity
    target: line_1
    location: b

  - id: line_p_120
    type: line_profile
    target: line_1
    frequency: 120 Hz
    quantity: pressure
    points: 65

  - id: line_q_120
    type: line_profile
    target: line_1
    frequency: 120 Hz
    quantity: volume_velocity
    points: 65

  - id: line_v_120
    type: line_profile
    target: line_1
    frequency: 120 Hz
    quantity: particle_velocity
    points: 65
