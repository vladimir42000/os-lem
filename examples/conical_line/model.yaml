meta:
  name: conical_line

driver:
  id: drv1
  model: ts_classic
  Re: 5.8 ohm
  Le: 0.35 mH
  Fs: 34 Hz
  Qes: 0.42
  Qms: 4.1
  Vas: 55 l
  Sd: 132 cm2
  node_front: front
  node_rear: rear

elements:
  - id: front_rad
    type: radiator
    node: front
    model: infinite_baffle_piston
    area: 132 cm2

  - id: rear_volume
    type: volume
    node: rear
    value: 8 l

  - id: line_1
    type: waveguide_1d
    node_a: rear
    node_b: mouth
    length: 1.45 m
    area_start: 120 cm2
    area_end: 320 cm2
    profile: conical
    segments: 12

  - id: mouth_rad
    type: radiator
    node: mouth
    model: unflanged_piston
    area: 320 cm2

observations:
  - id: zin
    type: input_impedance
    target: drv1

  - id: spl_driver
    type: spl
    target: front_rad
    distance: 1 m

  - id: spl_mouth
    type: spl
    target: mouth_rad
    distance: 1 m

  - id: spl_total
    type: spl_sum
    terms:
      - target: front_rad
        distance: 1 m
      - target: mouth_rad
        distance: 1 m

  - id: p_rear
    type: node_pressure
    target: rear

  - id: line_p_200
    type: line_profile
    target: line_1
    frequency: 200 Hz
    quantity: pressure
    points: 100
