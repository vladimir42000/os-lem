meta:
  name: free_air_driver

driver:
  id: drv1
  model: ts_classic
  Re: 5.8 ohm
  Le: 0.35 mH
  Fs: 34 Hz
  Qes: 0.42
  Qms: 4.1
  Vas: 55 l
  Sd: 132 cm2
  node_front: front
  node_rear: rear

elements:
  - id: rad_front
    type: radiator
    node: front
    model: infinite_baffle_piston
    area: 132 cm2

  - id: rad_rear
    type: radiator
    node: rear
    model: infinite_baffle_piston
    area: 132 cm2

observations:
  - id: zin
    type: input_impedance
    target: drv1

  - id: spl_front
    type: spl
    target: rad_front
    distance: 1 m

  - id: spl_rear
    type: spl
    target: rad_rear
    distance: 1 m
