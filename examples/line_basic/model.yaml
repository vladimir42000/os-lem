meta:
  name: line_basic

driver:
  id: drv1
  model: ts_classic
  Re: 5.8 ohm
  Le: 0.35 mH
  Fs: 34 Hz
  Qes: 0.42
  Qms: 4.1
  Vas: 55 l
  Sd: 132 cm2
  node_front: front
  node_rear: rear

elements:
  - id: front_rad
    type: radiator
    node: front
    model: infinite_baffle_piston
    area: 132 cm2

  - id: rear_line
    type: waveguide_1d
    node_a: rear
    node_b: mouth
    length: 1.60 m
    area_start: 132 cm2
    area_end: 132 cm2
    profile: conical
    segments: 16

  - id: mouth_rad
    type: radiator
    node: mouth
    model: unflanged_piston
    area: 132 cm2

observations:
  - id: zin
    type: input_impedance
    target: drv1

  - id: spl_mouth
    type: spl
    target: mouth_rad
    distance: 1 m

  - id: line_p_200
    type: line_profile
    target: rear_line
    frequency: 200 Hz
    quantity: pressure
    points: 100
